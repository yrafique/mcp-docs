# mcp-docs — LAB mode: the docs MCP server + its own docs-db backend (was
# components/data-platform). docs-db self-seeds from this stack's seed/ corpus on a
# fresh volume; the persistent data dir is /var/lib/mcp-docs/docs-db.
#   docker compose -f compose.lab.yml up -d --build
name: mcp-docs
services:
  mcp-docs:
    build:
      context: .
      network: host
    image: mcp-docs:latest
    container_name: mcp-docs
    env_file: [ "${MCP_ENV:-../mcp.env}" ]   # single source (DOCS_DATABASE_URL -> lab docs-db .64); override path via $MCP_ENV
    ports:
      - "${DOCS_PORT:-9715}:9705"
    networks:
      - mcp_net
    restart: unless-stopped
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',9705)); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      docs-db:
        condition: service_healthy

  # ── docs corpus DB (was components/data-platform docs-db) ──
  # ParadeDB (Postgres + BM25 + pgvector). Self-seeds from ./seed on a fresh volume.
  docs-db:
    image: paradedb/paradedb:latest
    container_name: docs-db
    hostname: docs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DOCS_POSTGRES_USER:-mcp}
      POSTGRES_PASSWORD: ${DOCS_POSTGRES_PASSWORD:-mcp}
      POSTGRES_DB: ${DOCS_POSTGRES_DB:-docs_db}
    volumes:
    - ${DOCS_DATA_DIR:-docs-db-data}:/var/lib/postgresql
    - ./src/doc_store.sql.gz:/seed/doc_store.sql.gz:ro
    - ./seed/seed-docs-db.sh:/docker-entrypoint-initdb.d/10-seed-docs.sh:ro
    networks:
      - mcp_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d docs_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
networks:
  mcp_net:
    driver: bridge
volumes:
  docs-db-data:
